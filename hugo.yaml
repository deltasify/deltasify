baseURL: 'http://localhost:1313/'
title: Delta SIFY
languageCode: en-us
theme: tailbliss
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: false
enableRobotsTXT: true
canonifyURLs: false
pagination:
  pagerSize: 9
darkmode_js:
  - assets/js/darkmode.js
enableInlineShortcodes: true

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: Delta SIFY
  authorimage: ../assets/images/global/author.webp
  og_image: /images/deltasify-cover.png
  moto: "Change in Scientific Importance for Youth"
  description: "Change in Scientific Importance for Youth, also known as \"Delta SIFY,\" is a movement intended to provide immersive educational opportunities for students in underserved communities to explore the fields of STEM. We believe that access to a quality, fulfilling education should be a fundamental human right, not a privilege."
  disable_theme_toggle: false
  disable_stay_uptodate: true

  p1:
    heading: "UCR Highlander Invitational"
    image: "images/featured/invitational-homepage.png"
    content:
      - text: "Originally founded in 2022, the Highlander Invitational is the University of California, Riverside’s official Science Olympiad tournament and the largest STEM competition in the Inland Empire."
      - text: "The tournament’s goal is to drive engagement in STEM education by fostering youth engagement with the sciences. Students from all over California compete across the 46 middle and high school Science Olympiad events, covering areas such as biology, chemistry, physics, earth science, engineering, and more. Science Olympiad provides a unique opportunity for students to learn and collaborate in a curiosity-driven, friendly competitive environment."
  p2:
    heading: "Science Olympiad Coaching Program (SOCP)"
    image: "images/featured/scioly-coaching-homepage.png"
    content:
      - text: "The Science Olympiad Coaching Program (SOCP) connects dedicated volunteers with middle schoolers to prepare them for Science Olympiad, a track-meet style academic competition. As a coach, you will dedicate approximately one hour per week to develop lecture materials, research tasks, and practice tests, alongside a one-hour weekly coaching session."
      - text: "Having prior Science Olympiad experience is preferred, but not a strict requirement. You have the flexibility to coach an event independently or team up with a partner. By aiming for at least two coaches per event, we strive to distribute the workload and accommodate scheduling needs effectively."
  p3:
    heading: "MathCounts Mentoring Program (MMP)"
    image: "images/featured/math-mentoring-homepage.png"
    content:
      - text: "MATHCOUNTS is a national math enrichment program and competition series for middle school students in grades 6-8. It focuses on critical thinking and problem-solving skills. The program has four levels of live, in-person competitions: School, Chapter, State, and National."
      - text: "As a mentor, you play a pivotal role in guiding students to reach their full potential and succeed at every level of competition. Coaches will work with small groups of students, teaching specific topics and reviewing problems with them once a week."
  p4:
    heading: "From the blog"
    content:
      - text: "Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ipsa libero labore natus atque, ducimus sed."
  p5:
    heading: "Stay Up to Date"
    content:
      - text: "Sagittis scelerisque nulla cursus in enim consectetur quam. Dictum urna sed consectetur neque tristique pellentesque."
    action: "#"
    label: "Email address"
    placeholder: "Enter your email"
    button: "Notify me"

