baseURL: 'http://localhost:1313/'
title: Delta SIFY
languageCode: en-us
theme: tailbliss
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: false
enableRobotsTXT: true
canonifyURLs: false
pagination:
  pagerSize: 9
darkmode_js:
  - assets/js/darkmode.js
enableInlineShortcodes: true

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: Delta SIFY
  authorimage: ../assets/images/global/author.webp
  og_image: /images/tailbliss-cover.png
  moto: "Change in Scientific Importance for Youth (Est. 2014)"
  description: "Change in Scientific Importance for Youth, also known as \"Delta SIFY,\" is a movement intended to provide immersive educational opportunities for students in underserved communities to explore the fields of STEM. We believe that access to a quality, fulfilling education should be a fundamental human right, not a privilege."
  disable_theme_toggle: false
  disable_stay_uptodate: true

  p1:
    heading: "UCR Highlander Invitational"
    image: "images/deltasify-logo.png"
    content:
      - text: "Originally founded in 2022, the Highlander Invitational is the University of California, Riverside’s official Science Olympiad tournament and the largest STEM competition in the Inland Empire."
      - text: "The tournament’s goal is to drive engagement in STEM education by fostering youth engagement with the sciences. Students from all over California compete across the 46 middle and high school Science Olympiad events, covering areas such as biology, chemistry, physics, earth science, engineering, and more. Science Olympiad provides a unique opportunity for students to learn and collaborate in a curiosity-driven, friendly competitive environment."
